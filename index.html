<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חסידים סנטר ✂️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://script.google.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet"></noscript>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
body { background: linear-gradient(145deg, #fdf8ee, #faf3df, #f5ead0); min-height: 100vh; direction: rtl; }
body::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 480px; height: 480px; background: url('https://raw.githubusercontent.com/weiss05485-cc/tofrut/main/logo.png') center/contain no-repeat; opacity: 0.1; pointer-events: none; z-index: 0; }
#loginScreen, #mainScreen { position: relative; z-index: 1; }
.header { background: linear-gradient(135deg, #b19343, #d4b96a, #b19343); padding: 22px 20px 16px; text-align: center; box-shadow: 0 4px 20px rgba(177,147,67,0.4); position: sticky; top: 0; z-index: 100; }
.header h1 { color: white; font-size: 1.8rem; font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header p  { color: rgba(255,255,255,0.85); font-size: 0.9rem; margin-top: 4px; }
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px); padding: 20px; }
.login-card { background: white; border-radius: 24px; padding: 36px 32px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(177,147,67,0.2); border: 1px solid #f0e4b8; }
.login-card h2 { text-align: center; color: #b19343; font-size: 1.5rem; font-weight: 900; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-weight: 700; color: #555; margin-bottom: 6px; font-size: 0.9rem; }
.field select, .field input { width: 100%; padding: 12px 14px; border: 2px solid #e8d9a0; border-radius: 12px; font-size: 1rem; font-family: 'Heebo', sans-serif; outline: none; background: white; text-align: right; direction: rtl; transition: border-color 0.2s; }
.field select:focus, .field input:focus { border-color: #b19343; box-shadow: 0 0 0 3px rgba(177,147,67,0.15); }
.btn-gold { width: 100%; padding: 14px; background: linear-gradient(135deg, #b19343, #d4b96a); color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(177,147,67,0.35); font-family: 'Heebo', sans-serif; }
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(177,147,67,0.45); }
.btn-green { padding: 10px 20px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.2s; }
.btn-green:hover { transform: translateY(-1px); }
.btn-red { padding: 10px 20px; background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.2s; }
.btn-red:hover { transform: translateY(-1px); }
.btn-del { padding: 4px 12px; background: #fff0f0; color: #e74c3c; border: 1px solid #fcc; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.15s; }
.btn-del:hover { background: #e74c3c; color: white; }
#mainScreen { display: none; max-width: 900px; margin: 0 auto; padding: 16px; }
.user-bar { background: white; border-radius: 16px; padding: 14px 18px; border-right: 5px solid #b19343; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(177,147,67,0.12); display: flex; align-items: center; justify-content: space-between; }
.uname { font-size: 1rem; font-weight: 800; color: #3a2e0f; }
.ubranch { font-size: 0.85rem; color: #888; margin-top: 2px; }
.badge { background: linear-gradient(135deg, #b19343, #d4b96a); color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
.tabs { display: flex; background: white; border-radius: 16px; padding: 6px; gap: 4px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(177,147,67,0.1); border: 1px solid #f0e4b8; overflow-x: auto; }
.tab-btn { flex: 1; min-width: 80px; padding: 9px 12px; border: none; border-radius: 12px; background: transparent; color: #999; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.18s; font-family: 'Heebo', sans-serif; white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, #b19343, #d4b96a); color: white; }
.card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 16px rgba(177,147,67,0.1); border: 1px solid #f0e4b8; }
.card-title { font-size: 1rem; font-weight: 800; color: #b19343; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #f0e4b8; }
.repair-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.repair-btn { background: white; border: 2px solid #e8d9a0; border-radius: 16px; padding: 14px 8px; cursor: pointer; transition: all 0.18s; text-align: center; font-family: 'Heebo', sans-serif; box-shadow: 0 2px 8px rgba(177,147,67,0.08); }
.repair-btn:hover { background: linear-gradient(135deg, #b19343, #d4b96a); border-color: #b19343; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(177,147,67,0.3); }
.repair-btn:hover .r-name, .repair-btn:hover .r-price { color: white; }
.r-name { font-weight: 800; font-size: 0.9rem; color: #5a4820; line-height: 1.3; }
.r-price { font-size: 0.85rem; color: #b19343; font-weight: 700; margin-top: 4px; }
.success-bubble { background: linear-gradient(135deg, #b19343, #d4b96a); color: white; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 16px; animation: popIn 0.3s ease; box-shadow: 0 6px 20px rgba(177,147,67,0.4); }
.success-bubble h3 { font-size: 1.3rem; margin-bottom: 6px; }
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #f0e4b8; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th { background: linear-gradient(135deg, #b19343, #d4b96a); color: white; padding: 11px 14px; text-align: right; font-weight: 700; }
td { padding: 10px 14px; border-bottom: 1px solid #f5edd8; text-align: right; color: #444; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fdf8ee; }
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.metric-card { background: white; border-radius: 16px; padding: 18px; text-align: center; border: 1px solid #f0e4b8; box-shadow: 0 2px 10px rgba(177,147,67,0.08); }
.m-val { font-size: 1.8rem; font-weight: 900; color: #b19343; }
.m-lbl { font-size: 0.8rem; color: #888; margin-top: 4px; }
.bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
.bar-lbl { width: 100px; font-size: 0.85rem; color: #555; font-weight: 600; flex-shrink: 0; }
.bar-wrap { flex: 1; background: #f0e4b8; border-radius: 8px; overflow: hidden; height: 28px; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #b19343, #d4b96a); border-radius: 8px; display: flex; align-items: center; padding-right: 10px; transition: width 0.8s ease; }
.bar-val { font-size: 0.8rem; color: white; font-weight: 700; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.msg-err { background: #ffe0e0; color: #c0392b; padding: 10px 14px; border-radius: 10px; font-weight: 600; margin-bottom: 12px; font-size: 0.9rem; }
.msg-ok  { background: #e0f8e9; color: #27ae60; padding: 10px 14px; border-radius: 10px; font-weight: 600; margin-bottom: 12px; font-size: 0.9rem; }
.loader { display: inline-block; width: 22px; height: 22px; border: 3px solid #f0e4b8; border-top-color: #b19343; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.tab-content { display: none; }
.tab-content.active { display: block; }
.filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-row select { padding: 10px 14px; border: 2px solid #e8d9a0; border-radius: 12px; font-size: 0.95rem; font-family: 'Heebo', sans-serif; outline: none; background: white; direction: rtl; }
.filter-row select:focus { border-color: #b19343; }
.repair-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #f5edd8; }
.repair-item:last-child { border-bottom: none; }
.repair-item-info { font-weight: 700; color: #5a4820; font-size: 0.9rem; }
.repair-item-price { color: #b19343; font-weight: 700; font-size: 0.9rem; }
.inline-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.inline-form input { padding: 10px 12px; border: 2px solid #e8d9a0; border-radius: 10px; font-size: 0.9rem; font-family: 'Heebo', sans-serif; outline: none; }
.inline-form input:focus { border-color: #b19343; }
@media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } .repair-grid { grid-template-columns: repeat(2, 1fr); } .metrics { grid-template-columns: repeat(2, 1fr); } .login-card { padding: 24px 18px; } .filter-row { gap: 8px; } }
</style>
</head>
<body>

<div class="header">
  <h1>✂️ חסידים סנטר</h1>
  <p>מערכת ניהול תיקוני בגדים</p>
</div>

<div id="loginScreen">
  <div class="login-card">
    <h2>כניסת עובדות 👋</h2>
    <div id="loginMsg"></div>
    <div class="field">
      <label>שם עובדת:</label>
      <select id="selName"><option value="">⏳ טוען...</option></select>
    </div>
    <div class="field">
      <label>סיסמה אישית:</label>
      <input type="password" id="inpPass" placeholder="הכניסי סיסמה..." onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-gold" id="loginBtn" onclick="doLogin()">כניסה למערכת ←</button>
  </div>
</div>

<div id="mainScreen">
  <div class="user-bar">
    <div>
      <div class="uname" id="uName"></div>
      <div class="ubranch" id="uBranch"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="badge" id="uRole"></span>
      <button class="btn-red" onclick="logout()">🚪 יציאה</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('report',this)">📝 דיווח</button>
    <button class="tab-btn" onclick="showTab('mylog',this)">📜 יומן שלי</button>
    <button class="tab-btn mgr" onclick="showTab('stats',this)" style="display:none">📊 דוחות</button>
    <button class="tab-btn mgr" onclick="showTab('manage',this)" style="display:none">⚙️ ניהול</button>
  </div>

  <!-- דיווח -->
  <div id="tab-report" class="tab-content active">
    <div id="successMsg"></div>
    <div class="card">
      <div class="card-title" id="priceTitle">📋 טוען מחירון...</div>
      <div class="repair-grid" id="repairGrid">
        <div style="grid-column:1/-1;text-align:center;padding:20px;color:#888"><span class="loader"></span> טוען...</div>
      </div>
    </div>
  </div>

  <!-- יומן אישי -->
  <div id="tab-mylog" class="tab-content">
    <div class="card">
      <div class="card-title">📜 הפעולות האחרונות שלי</div>
      <div id="myLogContent"><div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div></div>
    </div>
  </div>

  <!-- דוחות -->
  <div id="tab-stats" class="tab-content">
    <div class="filter-row">
      <select id="monthFilter" onchange="applyFilter()">
        <option value="">כל החודשים</option>
      </select>
      <button class="btn-green" onclick="exportExcel()">📥 ייצוא Excel</button>
    </div>
    <div class="metrics">
      <div class="metric-card"><div class="m-val" id="mTotal">-</div><div class="m-lbl">💰 סה"כ הכנסות</div></div>
      <div class="metric-card"><div class="m-val" id="mCount">-</div><div class="m-lbl">📋 מספר פעולות</div></div>
      <div class="metric-card"><div class="m-val" id="mTop">-</div><div class="m-lbl">🏆 תופרת מובילה</div></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="card-title">הכנסות לפי תופרת</div><div id="chartWorker"></div></div>
      <div class="card"><div class="card-title">הכנסות לפי סניף</div><div id="chartBranch"></div></div>
    </div>
    <div class="card"><div class="card-title">📋 יומן כללי</div><div id="allLogContent"></div></div>
  </div>

  <!-- ניהול -->
  <div id="tab-manage" class="tab-content">
    <div class="two-col">
      <!-- הוספת עובדת -->
      <div class="card">
        <div class="card-title">👤 הוספת עובדת</div>
        <div id="addMsg"></div>
        <div class="field"><label>שם מלא:</label><input type="text" id="nName" placeholder="שם העובדת"></div>
        <div class="field"><label>סניף:</label><select id="nBranch"><option value="ירושלים">ירושלים</option><option value="בני ברק">בני ברק</option></select></div>
        <div class="field"><label>סיסמה:</label><input type="text" id="nPass" placeholder="סיסמה"></div>
        <div class="field"><label>תפקיד:</label><select id="nRole"><option value="עובדת">עובדת</option><option value="ניהול">ניהול</option><option value="הנהלת חשבונות">הנהלת חשבונות</option></select></div>
        <button class="btn-gold" onclick="doAddWorker()">➕ הוספה</button>
      </div>
      <!-- רשימת צוות -->
      <div class="card">
        <div class="card-title">📋 רשימת הצוות</div>
        <div id="staffContent"><div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div></div>
      </div>
    </div>

    <!-- ניהול מחירון -->
    <div class="card">
      <div class="card-title">🔧 ניהול מחירון תיקונים</div>
      <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <label style="font-weight:700;color:#555;">סניף:</label>
        <select id="priceBranch" onchange="loadRepairList()" style="padding:10px 14px;border:2px solid #e8d9a0;border-radius:12px;font-family:'Heebo',sans-serif;font-size:0.95rem;outline:none;">
          <option value="ירושלים">ירושלים</option>
          <option value="בני ברק">בני ברק</option>
        </select>
      </div>
      <div id="repairMsgManage"></div>
      <div style="margin-bottom:14px">
        <div style="font-weight:700;color:#555;margin-bottom:8px;font-size:0.9rem;">➕ הוספת תיקון חדש:</div>
        <div class="inline-form">
          <input type="text" id="rName" placeholder="שם התיקון" style="flex:2;min-width:140px;">
          <input type="number" id="rPrice" placeholder="מחיר ₪" style="flex:1;min-width:90px;">
          <button class="btn-gold" style="width:auto;padding:10px 20px;font-size:0.9rem;" onclick="doAddRepair()">➕ הוסף</button>
        </div>
      </div>
      <div id="repairListManage"><div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div></div>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxz1qTMOw0RX3EajzDA8HiNMJMz6Or4OId_FOhi0ug_igPeAxHXD4Nf73EjAL7fx9Uc/exec";

let user = null;
let allLogData = [];
let myLogLoaded = false;
let statsLoaded = false;
let staffLoaded = false;

async function api(params) {
  const res = await fetch(API + "?" + new URLSearchParams(params));
  return res.json();
}

// --- Cache ---
function cacheSet(key, data, ttlMinutes) {
  localStorage.setItem(key, JSON.stringify({ data, expires: Date.now() + ttlMinutes * 60000 }));
}
function cacheGet(key) {
  try {
    const item = JSON.parse(localStorage.getItem(key));
    if (item && Date.now() < item.expires) return item.data;
  } catch(e) {}
  return null;
}

// --- טעינת שמות + pre-warm ---
window.onload = async function() {
  const sel = document.getElementById("selName");
  const loginBtn = document.getElementById("loginBtn");
  const cached = cacheGet("staffNames");
  if (cached) {
    // יש cache — מילוי מיידי, כפתור פעיל
    sel.innerHTML = '<option value="">-- בחרי שם --</option>';
    cached.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
    // רענן ברקע בשקט
    api({ action: "getStaff" }).then(names => {
      if (names && names.length) {
        cacheSet("staffNames", names, 120);
        sel.innerHTML = '<option value="">-- בחרי שם --</option>';
        names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
      }
    }).catch(()=>{});
  } else {
    // אין cache — נעל כפתור עד שApp Script מוכן
    loginBtn.disabled = true;
    loginBtn.textContent = "⏳ מתחבר לשרת...";
    sel.innerHTML = '<option value="">טוען...</option>';
    try {
      const names = await api({ action: "getStaff" });
      cacheSet("staffNames", names, 120);
      sel.innerHTML = '<option value="">-- בחרי שם --</option>';
      names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
    } catch(e) {
      sel.innerHTML = '<option value="">שגיאת חיבור</option>';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "כניסה";
    }
  }
};

// --- כניסה ---
async function doLogin() {
  const name = document.getElementById("selName").value;
  const pass = document.getElementById("inpPass").value;
  const msg  = document.getElementById("loginMsg");
  if (!name) { msg.innerHTML = '<div class="msg-err">בחרי שם עובדת</div>'; return; }
  if (!pass) { msg.innerHTML = '<div class="msg-err">הכניסי סיסמה</div>'; return; }

  // בדוק cache של session קודם
  const sessionKey = "session_" + name;
  const cached = cacheGet(sessionKey);
  if (cached && cached.pass === pass) {
    user = cached.user;
    enterApp();
    return;
  }

  msg.innerHTML = '<div style="text-align:center;padding:8px;color:#888"><span class="loader"></span> מתחברת...</div>';
  try {
    const res = await api({ action: "login", name, pass });
    if (res.ok) {
      cacheSet(sessionKey, { pass, user: res }, 480); // שמור 8 שעות
      user = res;
      enterApp();
    } else msg.innerHTML = '<div class="msg-err">❌ סיסמה לא נכונה</div>';
  } catch(e) { msg.innerHTML = '<div class="msg-err">❌ שגיאת חיבור</div>'; }
}

function enterApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainScreen").style.display  = "block";
  document.getElementById("uName").textContent   = "שלום, " + user.name + " 👋";
  document.getElementById("uBranch").textContent = "📍 סניף " + user.branch;
  const role = (user.role || "").trim();
  document.getElementById("uRole").textContent = role === "ניהול" ? "מנהלת" : role === "הנהלת חשבונות" ? "הנה\"ח" : "עובדת";
  // הסתר תמיד קודם, הצג רק למי שצריך
  document.querySelectorAll(".mgr").forEach(el => el.style.display = "none");
  if (role === "ניהול" || role === "הנהלת חשבונות") {
    document.querySelectorAll(".mgr").forEach(el => el.style.display = "");
  }
  loadPrices();
}

function logout() {
  user = null; allLogData = []; myLogLoaded = false; statsLoaded = false; staffLoaded = false;
  document.getElementById("mainScreen").style.display  = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("inpPass").value = "";
  document.getElementById("loginMsg").innerHTML = "";
  document.getElementById("successMsg").innerHTML = "";
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-report").classList.add("active");
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", i===0));
  document.querySelectorAll(".mgr").forEach(el => el.style.display = "none");
}

function showTab(name, btn) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
  if (name === "mylog" && !myLogLoaded)  loadMyLog();
  if (name === "stats" && !statsLoaded)  loadStats();
  if (name === "manage" && !staffLoaded) { loadStaffTable(); loadRepairList(); }
}

// --- מחירון ---
function renderPrices(list) {
  const grid = document.getElementById("repairGrid");
  if (!list || !list.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#888">לא נמצאו פריטים</div>'; return; }
  const showPrice = (user.role || "").trim() !== "עובדת";
  grid.innerHTML = "";
  list.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "repair-btn";
    btn.innerHTML = `<div class="r-name">${item.name}</div>${showPrice && item.price ? `<div class="r-price">₪${item.price}</div>` : ""}`;
    btn.onclick = () => doRepair(item);
    grid.appendChild(btn);
  });
}

async function loadPrices() {
  document.getElementById("priceTitle").textContent = "📋 מחירון סניף " + user.branch;
  const cacheKey = "prices_" + user.branch;
  const cached = cacheGet(cacheKey);
  if (cached) {
    renderPrices(cached);
    // רענון שקט ברקע — לא מחכים לו
    api({ action: "getPrices", branch: user.branch }).then(list => {
      if (list && list.length) { cacheSet(cacheKey, list, 120); renderPrices(list); }
    }).catch(()=>{});
    return;
  }
  document.getElementById("repairGrid").innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#888"><span class="loader"></span> טוען...</div>';
  try {
    const list = await api({ action: "getPrices", branch: user.branch });
    cacheSet(cacheKey, list, 120);
    renderPrices(list);
  } catch(e) {
    document.getElementById("repairGrid").innerHTML = '<div style="grid-column:1/-1;color:red;padding:10px">שגיאה בטעינת מחירון</div>';
  }
}

let repairPending = false;
function doRepair(item) {
  if (repairPending) return; // מנע לחיצה כפולה
  repairPending = true;
  setTimeout(() => repairPending = false, 1500);

  // הצג הצלחה מיד
  const price = item.price ? "₪" + item.price : "";
  document.getElementById("successMsg").innerHTML = `<div class="success-bubble"><h3>✅ נרשם בהצלחה!</h3><p>${item.name}${price ? " — " + price : ""}</p></div>`;
  setTimeout(() => document.getElementById("successMsg").innerHTML = "", 3000);
  myLogLoaded = false;
  localStorage.removeItem("myLog_" + user.name);
  localStorage.removeItem("allLog");

  // שלח לגוגל ברקע — לא מחכים
  api({ action: "logRepair", branch: user.branch, worker: user.name, repair: item.name, price: item.price || "" }).catch(() => {
    document.getElementById("successMsg").innerHTML = '<div class="msg-err">⚠️ שגיאת חיבור — הרישום לא נשמר!</div>';
    setTimeout(() => document.getElementById("successMsg").innerHTML = "", 4000);
  });
}

// --- יומן אישי ---
function renderMyLog(rows) {
  const cont = document.getElementById("myLogContent");
  if (!rows || !rows.length) { cont.innerHTML = '<div style="text-align:center;padding:20px;color:#888">אין פעולות רשומות עדיין</div>'; return; }
  const showPrice = (user.role || "").trim() !== "עובדת";
  let html = '<div class="tbl-wrap"><table><tr><th>תאריך</th><th>תיקון</th>' + (showPrice ? '<th>מחיר</th>' : '') + '<th></th></tr>';
  rows.forEach(r => {
    const date = r[0]||"", repair = r[3]||"", price = r[4]||"", rowNum = r[5]||"";
    html += `<tr>
      <td>${date}</td>
      <td>${repair}</td>
      ${showPrice ? `<td>${price ? "₪"+price : ""}</td>` : ""}
      <td><button class="btn-del" onclick="doDeleteLog(${rowNum},'${repair.replace(/'/g,"\\'")}')">🗑️</button></td>
    </tr>`;
  });
  html += "</table></div>";
  cont.innerHTML = html;
}

async function loadMyLog() {
  myLogLoaded = true;
  const cont = document.getElementById("myLogContent");
  const cacheKey = "myLog_" + user.name;
  const cached = cacheGet(cacheKey);
  if (cached) {
    renderMyLog(cached);
    // רענן ברקע בשקט
    api({ action: "getMyLog", worker: user.name }).then(rows => {
      if (rows) { cacheSet(cacheKey, rows, 4); renderMyLog(rows); }
    }).catch(()=>{});
    return;
  }
  cont.innerHTML = '<div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div>';
  try {
    const rows = await api({ action: "getMyLog", worker: user.name });
    cacheSet(cacheKey, rows, 4);
    renderMyLog(rows);
  } catch(e) { cont.innerHTML = '<div class="msg-err">שגיאת חיבור</div>'; }
}

async function doDeleteLog(rowNum, repair) {
  if (!confirm(`למחוק את הרישום "${repair}"?`)) return;
  try {
    const res = await api({ action: "deleteLog", rowNum });
    if (res.ok) { myLogLoaded = false; loadMyLog(); }
    else alert("שגיאה במחיקה");
  } catch(e) { alert("שגיאה במחיקה"); }
}

// --- דוחות ---
async function loadStats() {
  if (allLogData.length === 0) {
    const cached = cacheGet("allLog");
    if (cached) {
      allLogData = cached;
      buildMonthFilter();
      statsLoaded = true;
      applyFilter();
      // רענן ברקע
      api({ action: "getAllLog" }).then(d => {
        if (d && d.length) { allLogData = d; cacheSet("allLog", d, 5); buildMonthFilter(); applyFilter(); }
      }).catch(()=>{});
      return;
    }
    try {
      allLogData = await api({ action: "getAllLog" }) || [];
      cacheSet("allLog", allLogData, 5);
      buildMonthFilter();
    } catch(e) { return; }
  }
  statsLoaded = true;
  applyFilter();
}

function buildMonthFilter() {
  const months = new Set();
  allLogData.forEach(r => {
    const d = String(r[0]);
    if (d.length >= 7) {
      const parts = d.split("/");
      if (parts.length >= 3) months.add(parts[1] + "/" + parts[2].substring(0,4));
    }
  });
  const sel = document.getElementById("monthFilter");
  sel.innerHTML = '<option value="">כל החודשים</option>';
  const monthNames = ["","ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  [...months].sort((a,b) => {
    const [ma,ya] = a.split("/"); const [mb,yb] = b.split("/");
    return (yb-ya) || (mb-ma);
  }).forEach(m => {
    const [mm, yy] = m.split("/");
    const label = (monthNames[parseInt(mm)] || mm) + " " + yy;
    sel.innerHTML += `<option value="${m}">${label}</option>`;
  });
}

function applyFilter() {
  const sel = document.getElementById("monthFilter").value;
  const rows = sel ? allLogData.filter(r => {
    const d = String(r[0]);
    const parts = d.split("/");
    if (parts.length < 3) return false;
    return (parts[1] + "/" + parts[2].substring(0,4)) === sel;
  }) : allLogData;

  if (!rows.length) {
    document.getElementById("mTotal").textContent = "₪0";
    document.getElementById("mCount").textContent = "0";
    document.getElementById("mTop").textContent = "-";
    document.getElementById("chartWorker").innerHTML = "";
    document.getElementById("chartBranch").innerHTML = "";
    document.getElementById("allLogContent").innerHTML = '<div style="text-align:center;padding:20px;color:#888">אין נתונים</div>';
    return;
  }

  let total = 0, wMap = {}, bMap = {};
  rows.forEach(r => { const p = parseFloat(r[4])||0; total+=p; wMap[r[2]]=(wMap[r[2]]||0)+p; bMap[r[1]]=(bMap[r[1]]||0)+p; });
  document.getElementById("mTotal").textContent = "₪" + total.toLocaleString();
  document.getElementById("mCount").textContent = rows.length;
  document.getElementById("mTop").textContent = Object.keys(wMap).sort((a,b)=>wMap[b]-wMap[a])[0]||"-";
  renderBar("chartWorker", wMap);
  renderBar("chartBranch", bMap);
  document.getElementById("allLogContent").innerHTML = '<div class="tbl-wrap">' + buildTable(["תאריך","סניף","תופרת","תיקון","מחיר"], rows.slice(0,100)) + "</div>";
}

function renderBar(id, data) {
  const keys = Object.keys(data).sort((a,b)=>data[b]-data[a]);
  const max = data[keys[0]]||1;
  document.getElementById(id).innerHTML = keys.map(k =>
    `<div class="bar-row"><div class="bar-lbl">${k}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(data[k]/max*100)}%"><span class="bar-val">₪${data[k].toLocaleString()}</span></div></div></div>`
  ).join("");
}

// --- ייצוא Excel ---
function exportExcel() {
  if (!window.XLSX) {
    const s = document.createElement("script");
    s.src = "https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js";
    s.onload = doExport;
    document.head.appendChild(s);
    return;
  }
  doExport();
}
function doExport() {
  const sel = document.getElementById("monthFilter").value;
  const rows = sel ? allLogData.filter(r => {
    const parts = String(r[0]).split("/");
    return parts.length >= 3 && (parts[1] + "/" + parts[2].substring(0,4)) === sel;
  }) : allLogData;

  if (!rows.length) { alert("אין נתונים לייצוא"); return; }

  // גיליון 1 — כל הנתונים
  const wsData = [["תאריך","סניף","תופרת","תיקון","מחיר"]].concat(rows.map(r => [r[0],r[1],r[2],r[3],parseFloat(r[4])||0]));
  const ws1 = XLSX.utils.aoa_to_sheet(wsData);

  // גיליון 2 — סיכום לפי תופרת
  const wMap = {};
  rows.forEach(r => { const p = parseFloat(r[4])||0; wMap[r[2]]=(wMap[r[2]]||0)+p; });
  const sumData = [["תופרת","סה\"כ הכנסות","מספר פעולות"]];
  const cntMap = {};
  rows.forEach(r => { cntMap[r[2]]=(cntMap[r[2]]||0)+1; });
  Object.keys(wMap).sort((a,b)=>wMap[b]-wMap[a]).forEach(k => sumData.push([k, wMap[k], cntMap[k]]));
  sumData.push(["", "", ""]);
  sumData.push(["סה\"כ", rows.reduce((s,r)=>s+(parseFloat(r[4])||0),0), rows.length]);
  const ws2 = XLSX.utils.aoa_to_sheet(sumData);

  const monthNames = {"01":"ינואר","02":"פברואר","03":"מרץ","04":"אפריל","05":"מאי","06":"יוני","07":"יולי","08":"אוגוסט","09":"ספטמבר","10":"אוקטובר","11":"נובמבר","12":"דצמבר"};
  const label = sel ? (monthNames[sel.split("/")[0]] + "_" + sel.split("/")[1]) : "כל_התקופה";

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, "פירוט");
  XLSX.utils.book_append_sheet(wb, ws2, "סיכום לפי תופרת");
  XLSX.writeFile(wb, `חסידים_סנטר_${label}.xlsx`);
}

// --- ניהול עובדות ---
function renderStaffTable(rows) {
  const cont = document.getElementById("staffContent");
  if (!rows || !rows.length) { cont.innerHTML = '<div style="padding:10px;color:#888">אין עובדות</div>'; return; }
  let html = '<div class="tbl-wrap"><table><tr><th>סניף</th><th>שם</th><th>תפקיד</th><th></th></tr>';
  rows.forEach(r => {
    html += `<tr><td>${r.branch}</td><td>${r.name}</td><td>${r.role}</td><td><button class="btn-del" onclick="doDeleteWorker('${r.name.replace(/'/g,"\\'")}')">🗑️</button></td></tr>`;
  });
  html += "</table></div>";
  cont.innerHTML = html;
}

async function loadStaffTable() {
  staffLoaded = true;
  const cont = document.getElementById("staffContent");
  const cached = cacheGet("staffList");
  if (cached) {
    renderStaffTable(cached);
    api({ action: "getStaff2" }).then(rows => { if (rows) cacheSet("staffList", rows, 30); }).catch(()=>{});
    return;
  }
  cont.innerHTML = '<div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div>';
  try {
    const rows = await api({ action: "getStaff2" });
    cacheSet("staffList", rows, 30);
    renderStaffTable(rows);
  } catch(e) { cont.innerHTML = '<div class="msg-err">שגיאה</div>'; }
}

async function doAddWorker() {
  const name=document.getElementById("nName").value.trim(), branch=document.getElementById("nBranch").value,
        pass=document.getElementById("nPass").value.trim(), role=document.getElementById("nRole").value,
        msg=document.getElementById("addMsg");
  if (!name||!pass) { msg.innerHTML='<div class="msg-err">נא למלא שם וסיסמה</div>'; return; }
  msg.innerHTML='<div style="color:#888"><span class="loader"></span> שומר...</div>';
  try {
    await api({ action:"addWorker", branch, name, pass, role });
    msg.innerHTML='<div class="msg-ok">✅ העובדת נוספה!</div>';
    document.getElementById("nName").value=""; document.getElementById("nPass").value="";
    localStorage.removeItem("staffNames");
    localStorage.removeItem("staffList");
    staffLoaded = false;
    loadStaffTable();
    setTimeout(()=>msg.innerHTML="",3000);
  } catch(e) { msg.innerHTML='<div class="msg-err">שגיאה</div>'; }
}

async function doDeleteWorker(name) {
  if (!confirm(`למחוק את ${name}?`)) return;
  try {
    await api({ action: "deleteWorker", name });
    localStorage.removeItem("staffNames");
    localStorage.removeItem("staffList");
    staffLoaded = false;
    loadStaffTable();
  } catch(e) { alert("שגיאה במחיקה"); }
}

// --- ניהול מחירון ---
async function loadRepairList() {
  const branch = document.getElementById("priceBranch").value;
  const cont = document.getElementById("repairListManage");
  cont.innerHTML = '<div style="text-align:center;padding:20px;color:#888"><span class="loader"></span></div>';
  try {
    const list = await api({ action: "getPrices", branch });
    if (!list || !list.length) { cont.innerHTML = '<div style="padding:10px;color:#888">אין תיקונים ברשימה</div>'; return; }
    let html = '<div style="border:1px solid #f0e4b8;border-radius:12px;overflow:hidden;">';
    list.forEach(item => {
      html += `<div class="repair-item">
        <div><span class="repair-item-info">${item.name}</span></div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="repair-item-price">${item.price ? "₪"+item.price : ""}</span>
          <button class="btn-del" onclick="doDeleteRepair('${item.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`;
    });
    html += "</div>";
    cont.innerHTML = html;
  } catch(e) { cont.innerHTML = '<div class="msg-err">שגיאה בטעינה</div>'; }
}

async function doAddRepair() {
  const branch = document.getElementById("priceBranch").value;
  const name = document.getElementById("rName").value.trim();
  const price = document.getElementById("rPrice").value.trim();
  const msg = document.getElementById("repairMsgManage");
  if (!name) { msg.innerHTML = '<div class="msg-err">נא להכניס שם תיקון</div>'; return; }
  msg.innerHTML = '<div style="color:#888"><span class="loader"></span> שומר...</div>';
  try {
    await api({ action: "addRepair", branch, name, price });
    msg.innerHTML = '<div class="msg-ok">✅ התיקון נוסף!</div>';
    document.getElementById("rName").value = "";
    document.getElementById("rPrice").value = "";
    localStorage.removeItem("prices_" + branch);
    loadRepairList();
    setTimeout(() => msg.innerHTML = "", 3000);
  } catch(e) { msg.innerHTML = '<div class="msg-err">שגיאה</div>'; }
}

async function doDeleteRepair(name) {
  const branch = document.getElementById("priceBranch").value;
  if (!confirm(`למחוק את "${name}" מהמחירון?`)) return;
  try {
    await api({ action: "deleteRepair", branch, name });
    localStorage.removeItem("prices_" + branch);
    loadRepairList();
  } catch(e) { alert("שגיאה במחיקה"); }
}

function buildTable(headers, rows) {
  return "<table><tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr>"+
    rows.map(r=>"<tr>"+r.map(c=>`<td>${c||""}</td>`).join("")+"</tr>").join("")+"</table>";
}
